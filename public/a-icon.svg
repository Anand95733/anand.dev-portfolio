<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="50%" style="stop-color:#E8930C"/>
      <stop offset="100%" style="stop-color:#D4800A"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Subtle border glow -->
  <rect x="4" y="4" width="504" height="504" rx="92" ry="92" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
  
  <!-- AE as a single text element with proper spacing -->
  <text x="256" y="340" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="220" fill="url(#accent)" text-anchor="middle" letter-spacing="12">AE</text>
  
  <!-- Bottom accent line -->
  <rect x="100" y="385" width="312" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
</svg>
